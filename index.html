<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nico's Codex</title>
<meta name="description" content="Nico's Codex — a curated knowledge base covering AI, technology, and beyond.">
<meta property="og:title" content="Nico's Codex">
<meta property="og:description" content="Links I actually use to learn this stuff. Took a while to find most of it — it's all here, pick any.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #03050a;
  overflow: hidden;
  cursor: none;
  user-select: none;
}

#canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Hero intro ── */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
  gap: 0.65rem;
}
#intro.hidden .intro-subtitle { opacity: 0; }

.intro-eyebrow {
  font-family: 'Syne', sans-serif;
  font-size: 0.68rem;
  font-weight: 400;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: #7de8ff;
  opacity: 0.65;
}

.intro-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(3rem, 7.5vw, 5.8rem);
  color: rgba(200, 220, 230, 0.93);
  line-height: 1;
  letter-spacing: 0.03em;
  text-shadow: 0 0 60px rgba(125,232,255,0.18), 0 0 120px rgba(125,232,255,0.08);
}

.intro-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(1.05rem, 2.5vw, 1.55rem);
  color: rgba(200,220,230,0.48);
  letter-spacing: 0.1em;
  max-width: 42ch;
  text-align: center;
  line-height: 1.45;
  padding: 0 1.25rem;
  transition: opacity 1.4s ease;
}

/* ── Corner labels ── */
.corner {
  position: fixed;
  font-family: 'Syne', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  color: rgba(80,110,130,0.6);
  pointer-events: none;
  z-index: 20;
  line-height: 1.7;
}
.corner a {
  color: rgba(125,232,255,0.45);
  text-decoration: none;
  pointer-events: auto;
  transition: color 0.2s;
}
.corner a:hover { color: #7de8ff; }

.corner-tl { top: 1.6rem; left: 1.8rem; }
.corner-tr { top: 1.6rem; right: 1.8rem; text-align: right; }
.corner-bl { bottom: 1.6rem; left: 1.8rem; }
.corner-br { bottom: 1.6rem; right: 1.8rem; text-align: right; }

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.28rem;
  transform: translate(-50%, 0);
  opacity: 0;
  transition: opacity 0.22s ease;
  width: 260px;
  text-align: center;
  padding: 0.9rem 1.1rem 0.85rem;
  background: rgba(3,5,10,0.88);
  border: 1px solid rgba(125,232,255,0.1);
  backdrop-filter: blur(10px);
}
#tooltip.visible { opacity: 1; }

.tt-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.07em;
  color: #7de8ff;
}

.tt-desc {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 0.9rem;
  color: rgba(200,220,230,0.72);
  line-height: 1.45;
}

.tt-badge {
  font-family: 'Syne', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  padding: 0.2em 0.6em;
  margin-top: 0.1rem;
}
.tt-badge.live {
  background: rgba(125,232,255,0.12);
  color: #7de8ff;
  border: 1px solid rgba(125,232,255,0.28);
}
.tt-badge.incoming {
  background: rgba(42,74,90,0.25);
  color: rgba(80,110,130,0.75);
  border: 1px solid rgba(42,74,90,0.45);
}

/* ── Mobile list — hidden everywhere, canvas is the UI ── */
#mobile-list { display: none; }

/* ── Motion permission bar (iOS only) ── */
#motion-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #7de8ff;
  background: rgba(3,5,10,0.6);
  border-bottom: 1px solid rgba(125,232,255,0.08);
  backdrop-filter: blur(12px);
  padding: 0.5rem 1.2rem;
  text-align: center;
  cursor: pointer;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
#motion-bar.dismissed {
  opacity: 0;
  transform: translateY(-100%);
  pointer-events: none;
}

@media (max-width: 700px) {
  .corner { display: none; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="motion-bar" class="dismissed">Enable motion →</div>

<div id="intro">
  <p class="intro-subtitle">Links I actually use to learn this stuff. Took a while to find most of it — it's all here, pick any.</p>
</div>

<div class="corner corner-tl">Nico's Codex<br>Free · No paywalls</div>
<div class="corner corner-tr">Explorer #001<br>Signal: Active</div>
<div class="corner corner-bl">
  <a href="https://github.com/niconomics-9" target="_blank" rel="noopener">GitHub</a><br>
  <a href="#" target="_blank" rel="noopener">Discord</a>
</div>
<div class="corner corner-br">
  <a href="https://ko-fi.com" target="_blank" rel="noopener">Fund a field entry →</a>
</div>

<div id="tooltip">
  <span class="tt-name"></span>
  <span class="tt-desc"></span>
  <span class="tt-badge"></span>
</div>

<div id="mobile-list">
  <div class="mob-header">
    <p class="mob-eyebrow">Transmission received</p>
    <h1 class="mob-title">Nico's Codex</h1>
    <p class="mob-subtitle">Move toward the light.</p>
  </div>
</div>

<script>
if (location.pathname.endsWith('/index.html'))
  location.replace(location.href.replace('/index.html', '/'));
// ── Topic data ────────────────────────────────────────────────────
const TOPICS = [
  {
    name:    "AI Knowledge Base",
    tagline: "Foundations · Prompting · Building",
    desc:    "Free, curated archive of AI learning resources — foundations, prompting, building, podcasts, newsletters, leaders, and repos.",
    url:     "ai.html",
    status:  "LIVE"
  },
  {
    name:    "Networking",
    tagline: "Protocols · Certs · Labs",
    desc:    "Free, curated archive of networking resources — fundamentals, protocols, certifications, and hands-on labs.",
    url:     "networking.html",
    status:  "LIVE"
  },
  {
    name:    "Scripting",
    tagline: "PowerShell · Bash · Python",
    desc:    "Curated scripting resources for IT pros and developers — PowerShell, Bash, Python, and automation. With a terminal game.",
    url:     "scripting.html",
    status:  "LIVE"
  },
  {
    name:    "Unreal Engine / Game Dev",
    tagline: "UE5 · Blueprints · C++",
    desc:    "Curated resources for learning UE5 — official docs, Blueprints, C++, free assets, and community. Includes an interactive terrain demo.",
    url:     "unreal.html",
    status:  "LIVE"
  },
];

// Fractional positions [fx, fy] — spread across viewport
const INIT_POS = [
  [0.25, 0.30],  // AI       — upper left
  [0.72, 0.27],  // Networking — upper right
  [0.30, 0.68],  // Scripting  — lower left
  [0.70, 0.68],  // Unreal     — lower right
];

// ── Build mobile list ─────────────────────────────────────────────
const mobileList = document.getElementById('mobile-list');
TOPICS.forEach(t => {
  const isLive = t.status === 'LIVE';
  const el = document.createElement(isLive ? 'a' : 'div');
  if (isLive) el.href = t.url;
  el.className = `mob-row ${isLive ? 'live' : 'inactive'}`;
  el.innerHTML =
    `<span class="mob-dot ${isLive ? 'live' : 'inactive'}"></span>` +
    `<span class="mob-info">` +
      `<span class="mob-name">${t.name}</span>` +
      `<span class="mob-desc">${t.desc}</span>` +
    `</span>` +
    `<span class="mob-tag ${isLive ? 'live' : 'incoming'}">${t.status}</span>`;
  mobileList.appendChild(el);
});

// ── Canvas + context ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

// ── Orb class ─────────────────────────────────────────────────────
class Orb {
  constructor(topic, fx, fy) {
    this.topic  = topic;
    this.isLive = topic.status === 'LIVE';
    this.fx = fx; this.fy = fy;

    this.baseX = fx * window.innerWidth;
    this.baseY = fy * window.innerHeight;
    this.x = this.baseX;
    this.y = this.baseY;

    this.baseRadius = this.isLive
      ? 52 + Math.random() * 16
      : 32 + Math.random() * 12;
    this.radius = this.baseRadius;

    this.phase      = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.22 + Math.random() * 0.28;

    this.driftAmpX = 18 + Math.random() * 22;
    this.driftAmpY = 14 + Math.random() * 18;
    this.driftSpX  = 0.06 + Math.random() * 0.07;
    this.driftSpY  = 0.05 + Math.random() * 0.06;
    this.driftPhX  = Math.random() * Math.PI * 2;
    this.driftPhY  = Math.random() * Math.PI * 2;

    this.hovered       = false;
    this.scale         = 1;
    this.clickPulse    = 0;
    this.clickTarget   = null;
    this.parallaxDepth = 0.6 + Math.random() * 0.6;
  }

  rebase() {
    this.baseX = this.fx * W;
    this.baseY = this.fy * H;
  }

  draw(ctx) {
    const { x, y, radius: r, isLive, hovered } = this;

    ctx.save();

    // Atmospheric outer glow
    const glowR    = r * (hovered ? 3.4 : 2.1);
    const outerGrd = ctx.createRadialGradient(x, y, r * 0.75, x, y, glowR);
    if (isLive) {
      outerGrd.addColorStop(0, hovered ? 'rgba(125,232,255,0.24)' : 'rgba(125,232,255,0.11)');
      outerGrd.addColorStop(1, 'rgba(125,232,255,0)');
    } else {
      outerGrd.addColorStop(0, hovered ? 'rgba(58,106,122,0.2)' : 'rgba(42,74,90,0.07)');
      outerGrd.addColorStop(1, 'rgba(42,74,90,0)');
    }
    ctx.beginPath();
    ctx.arc(x, y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = outerGrd;
    ctx.fill();

    // Shadow glow
    ctx.shadowColor = isLive ? '#7de8ff' : '#3a6a7a';
    ctx.shadowBlur  = isLive
      ? (hovered ? 52 : 26)
      : (hovered ? 22 : 9);

    // Core sphere gradient (highlight offset upper-left)
    const hx = x - r * 0.3, hy = y - r * 0.3;
    const coreGrd = ctx.createRadialGradient(hx, hy, 0, x, y, r);
    if (isLive) {
      coreGrd.addColorStop(0.00, '#f2fbff');
      coreGrd.addColorStop(0.18, '#b8f0ff');
      coreGrd.addColorStop(0.52, '#7de8ff');
      coreGrd.addColorStop(0.80, '#38b4d4');
      coreGrd.addColorStop(1.00, 'rgba(18,58,78,0.88)');
    } else {
      coreGrd.addColorStop(0.00, '#5e8e9e');
      coreGrd.addColorStop(0.32, '#3a6070');
      coreGrd.addColorStop(0.68, '#2a4a5a');
      coreGrd.addColorStop(1.00, 'rgba(4,14,20,0.92)');
    }
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = coreGrd;
    ctx.fill();

    ctx.shadowBlur = 0;

    // Specular highlight (clipped to orb)
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.clip();
    const specGrd = ctx.createRadialGradient(hx, hy, 0, hx, hy, r * 0.68);
    specGrd.addColorStop(0,    'rgba(255,255,255,0.74)');
    specGrd.addColorStop(0.42, 'rgba(255,255,255,0.16)');
    specGrd.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = specGrd;
    ctx.fillRect(x - r - 1, y - r - 1, (r + 1) * 2, (r + 1) * 2);

    ctx.restore();
  }

  contains(px, py) {
    const dx = px - this.x, dy = py - this.y;
    return Math.sqrt(dx * dx + dy * dy) < this.radius;
  }
}

// ── Particle class ────────────────────────────────────────────────
class Particle {
  constructor(seed) { this.init(seed); }
  init(fromBottom) {
    this.x     = Math.random() * (W || window.innerWidth);
    this.y     = fromBottom ? (H || window.innerHeight) + 6 : Math.random() * (H || window.innerHeight);
    this.vx    = (Math.random() - 0.5) * 0.22;
    this.vy    = -(0.14 + Math.random() * 0.38);
    this.alpha = 0.025 + Math.random() * 0.07;
    this.r     = 0.7 + Math.random() * 1.3;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y < -8) this.init(true);
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(125,232,255,${this.alpha})`;
    ctx.fill();
  }
}

// ── Init scene ────────────────────────────────────────────────────
const orbs      = TOPICS.map((t, i) => new Orb(t, INIT_POS[i][0], INIT_POS[i][1]));
const particles = Array.from({ length: 65 }, () => new Particle(false));

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  orbs.forEach(o => o.rebase());
}
window.addEventListener('resize', resize);
resize();

// ── Mouse ─────────────────────────────────────────────────────────
let mx = -9999, my = -9999;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

// Touch: show tooltip on hold, navigate on tap
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  const hit = orbs.find(o => o.isLive && o.clickPulse <= 0 && o.contains(mx, my));
  if (hit) { hit.clickPulse = 1; hit.clickTarget = hit.topic.url; }
  setTimeout(() => { mx = -9999; my = -9999; }, 600);
});

// ── Motion system ────────────────────────────────────────────────
let gyroActive   = false;
let gyroTargetX  = 0, gyroTargetY  = 0;
let gyroCurrentX = 0, gyroCurrentY = 0;
const hasMouse = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

function onOrient(e) {
  if (!gyroActive) return;
  gyroTargetX = Math.max(-20, Math.min(20, (e.gamma  || 0) * 0.65));
  gyroTargetY = Math.max(-20, Math.min(20, ((e.beta  || 0) - 90) * 0.65));
}
window.addEventListener('deviceorientation', onOrient);

function activateGyro() { gyroActive = true; }

const motionBar      = document.getElementById('motion-bar');
const IS_IOS         = /iPad|iPhone|iPod/.test(navigator.userAgent);
const needsPermission = IS_IOS
  && typeof DeviceMotionEvent !== 'undefined'
  && typeof DeviceMotionEvent.requestPermission === 'function';

function dismissBar() {
  motionBar.classList.add('dismissed');
  setTimeout(() => { motionBar.style.display = 'none'; }, 550);
}

if (needsPermission) {
  if (localStorage.getItem('motion-granted') === '1') {
    activateGyro();
  } else {
    motionBar.classList.remove('dismissed');
    motionBar.addEventListener('click', async () => {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res === 'granted') {
          localStorage.setItem('motion-granted', '1');
          activateGyro();
        }
      } catch (_) { /* denied — float fallback */ }
      dismissBar();
    });
  }
} else {
  // Android, desktop, or iOS < 13 — auto-activate on first real event
  window.addEventListener('deviceorientation', function autoActivate(e) {
    if (e.gamma !== null && !gyroActive) activateGyro();
  });
}

// ── Intro fade ────────────────────────────────────────────────────
let introHidden = false;
const intro = document.getElementById('intro');

// ── Tooltip refs ──────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const ttName  = tooltip.querySelector('.tt-name');
const ttDesc  = tooltip.querySelector('.tt-desc');
const ttBadge = tooltip.querySelector('.tt-badge');

function drawOrbLabel(orb) {
  const { x, y, radius: r, topic, hovered } = orb;
  const baseY = y + r + 16;
  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';

  // Name
  ctx.font      = '700 13px Syne, sans-serif';
  ctx.fillStyle = hovered ? '#7de8ff' : 'rgba(125,232,255,0.82)';
  ctx.shadowColor = 'rgba(125,232,255,0.4)';
  ctx.shadowBlur  = hovered ? 10 : 4;
  ctx.fillText(topic.name, x, baseY);

  // Tagline
  ctx.font        = 'italic 300 11px "Cormorant Garamond", serif';
  ctx.fillStyle   = hovered ? 'rgba(200,220,230,0.75)' : 'rgba(200,220,230,0.38)';
  ctx.shadowBlur  = 0;
  ctx.fillText(topic.tagline, x, baseY + 19);

  ctx.restore();
}

function updateTooltip(orb) {
  if (!orb) { tooltip.classList.remove('visible'); return; }
  const t = orb.topic;
  ttName.textContent  = t.name;
  ttDesc.textContent  = t.desc;
  ttBadge.textContent = t.status;
  ttBadge.className   = `tt-badge ${t.status === 'LIVE' ? 'live' : 'incoming'}`;

  const pad  = 14;
  const tipW = 260;
  const rawL = orb.x;
  const left = Math.max(tipW / 2 + pad, Math.min(W - tipW / 2 - pad, rawL));
  const top  = orb.y + orb.radius + 58;
  tooltip.style.left = `${left}px`;
  tooltip.style.top  = `${top}px`;
  tooltip.classList.add('visible');
}

// ── Click handler ─────────────────────────────────────────────────
document.addEventListener('click', e => {
  if (e.target.tagName === 'A') return;
  const hit = orbs.find(o => o.isLive && o.clickPulse <= 0 && o.contains(e.clientX, e.clientY));
  if (hit) { hit.clickPulse = 1; hit.clickTarget = hit.topic.url; }
});

// ── Thread lines ──────────────────────────────────────────────────
function drawThreads() {
  const THRESH = Math.min(W, H) * 0.34;
  for (let i = 0; i < orbs.length; i++) {
    for (let j = i + 1; j < orbs.length; j++) {
      const dx = orbs[i].x - orbs[j].x;
      const dy = orbs[i].y - orbs[j].y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < THRESH) {
        const prox      = 1 - d / THRESH;
        const hBoost    = (orbs[i].hovered || orbs[j].hovered) ? 0.44 : 0;
        const alpha     = prox * 0.13 + hBoost;
        ctx.beginPath();
        ctx.moveTo(orbs[i].x, orbs[i].y);
        ctx.lineTo(orbs[j].x, orbs[j].y);
        ctx.strokeStyle = `rgba(125,232,255,${alpha})`;
        ctx.lineWidth   = 0.5;
        ctx.stroke();
      }
    }
  }
}

// ── Cursor ────────────────────────────────────────────────────────
function drawCursor(onLive) {
  if (mx < -100) return;
  const sz  = 11, gap = 4;
  const col = onLive ? 'rgba(125,232,255,1)' : 'rgba(125,232,255,0.72)';
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = 1;
  ctx.shadowColor = 'rgba(125,232,255,0.45)';
  ctx.shadowBlur  = 7;
  ctx.beginPath();
  ctx.moveTo(mx - sz, my);   ctx.lineTo(mx - gap, my);
  ctx.moveTo(mx + gap, my);  ctx.lineTo(mx + sz, my);
  ctx.moveTo(mx, my - sz);   ctx.lineTo(mx, my - gap);
  ctx.moveTo(mx, my + gap);  ctx.lineTo(mx, my + sz);
  ctx.stroke();
  ctx.shadowBlur = 5;
  ctx.beginPath();
  ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.fill();
  ctx.restore();
}

// ── Render loop ───────────────────────────────────────────────────
let t = 0;
function render() {
  requestAnimationFrame(render);
  t += 0.003;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#03050a';
  ctx.fillRect(0, 0, W, H);

  // Particles
  for (const p of particles) { p.update(); p.draw(ctx); }

  // Compute parallax / gyro offset
  let offsetX = 0, offsetY = 0;
  if (gyroActive) {
    gyroCurrentX += (gyroTargetX - gyroCurrentX) * 0.22;
    gyroCurrentY += (gyroTargetY - gyroCurrentY) * 0.22;
    offsetX = gyroCurrentX;
    offsetY = gyroCurrentY;
  } else if (hasMouse && mx > -100) {
    offsetX = ((mx - W / 2) / (W / 2)) * 8;
    offsetY = ((my - H / 2) / (H / 2)) * 8;
  }

  // Drift positions
  for (const o of orbs) {
    o.x = o.baseX + Math.sin(t * o.driftSpX + o.driftPhX) * o.driftAmpX + offsetX * o.parallaxDepth;
    o.y = o.baseY + Math.cos(t * o.driftSpY + o.driftPhY) * o.driftAmpY + offsetY * o.parallaxDepth;
  }

  // Hover detection
  let hoveredOrb = null;
  for (const o of orbs) {
    o.hovered = o.contains(mx, my);
    if (o.hovered) hoveredOrb = o;
  }

  // Threads
  drawThreads();

  // Update scale + draw orbs
  for (const o of orbs) {
    let targetScale = o.hovered ? 1.5 : 1;
    if (o.clickPulse > 0) targetScale = 1 + o.clickPulse * 0.85;
    o.scale  += (targetScale - o.scale) * 0.1;
    const pulse = 1 + Math.sin(t * o.pulseSpeed + o.phase) * 0.052;
    o.radius = o.baseRadius * o.scale * pulse;

    if (o.clickPulse > 0) {
      o.clickPulse -= 0.038;
      if (o.clickPulse <= 0 && o.clickTarget) {
        window.location.href = o.clickTarget;
        o.clickTarget = null;
      }
    }

    o.draw(ctx);
    drawOrbLabel(o);
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.28, W/2, H/2, Math.max(W,H)*0.82);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Cursor on top
  drawCursor(hoveredOrb && hoveredOrb.isLive);

  // Intro fade on first hover
  if (hoveredOrb && !introHidden) {
    introHidden = true;
    intro.classList.add('hidden');
  }

  // Tooltip
  updateTooltip(hoveredOrb);
}

render();
</script>
</body>
</html>
